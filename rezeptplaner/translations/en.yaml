configuration:
  ai_base_url:
    name: AI Provider URL
    description: Base URL of your OpenAI-compatible AI provider (e.g. https://api.mistral.ai/v1)
  ai_model:
    name: Model name
    description: The model to use (e.g. mistral-small-latest, claude-haiku-4-5)
  ai_api_key:
    name: API Key
    description: Your API key for the chosen provider. Leave empty for local Ollama.
